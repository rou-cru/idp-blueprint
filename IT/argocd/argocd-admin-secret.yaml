apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: argocd-admin-password
  namespace: argocd
  labels:
    app.kubernetes.io/name: vaultstaticsecret
    app.kubernetes.io/instance: argocd-admin
    app.kubernetes.io/component: password-sync
  annotations:
    description: 'Syncs ArgoCD admin password from Vault KV store'
spec:
  vaultAuthRef: vault-system/vault-auth
  type: kv-v2
  mount: secret
  path: argocd/admin
  destination:
    create: true
    name: argocd-secret
    type: Opaque
  refreshAfter: 1h
  rolloutRestartTargets:
    - kind: Deployment
      name: argocd-server
